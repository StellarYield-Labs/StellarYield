name: API Coverage Audit

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  pull_request:
    paths:
      - "client/src/**"
      - "server/src/**"
      - "scripts/audit-api-coverage.ts"
      - ".github/workflows/api-coverage-audit.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "client/src/**"
      - "server/src/**"
      - "scripts/audit-api-coverage.ts"

jobs:
  audit:
    name: Audit API Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Run API coverage audit
        run: npm run audit:api

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: api-coverage-report.json
          retention-days: 30

      - name: Comment on PR with report
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('api-coverage-report.json')) {
              console.log('Report file not found, skipping comment');
              return;
            }
            const report = JSON.parse(fs.readFileSync('api-coverage-report.json', 'utf8'));
            const { summary } = report;

            let comment = '## 🔍 API Coverage Audit Report\n\n';
            comment += `| Metric | Count |\n`;
            comment += `|--------|-------|\n`;
            comment += `| Frontend Calls | ${summary.totalFrontendCalls} |\n`;
            comment += `| Backend Routes | ${summary.totalBackendRoutes} |\n`;
            comment += `| Missing Routes | ❌ ${summary.missingRoutes} |\n`;
            comment += `| Undocumented Routes | ⚠️ ${summary.undocumentedRoutes} |\n`;

            if (summary.missingRoutes > 0) {
              comment += `\n### ❌ Missing Backend Routes\n`;
              report.findings
                .filter(f => f.issue === 'missing')
                .slice(0, 5)
                .forEach(f => {
                  comment += `- \`${f.frontendEndpoint.path}\` (${f.frontendEndpoint.method})\n`;
                  comment += `  - From: \`${f.frontendEndpoint.source}\`\n`;
                });
              if (report.findings.filter(f => f.issue === 'missing').length > 5) {
                comment += `- ... and ${report.findings.filter(f => f.issue === 'missing').length - 5} more\n`;
              }
            } else {
              comment += `\n✅ All frontend API calls have matching backend routes!\n`;
            }

            comment += `\n**Full report**: [Download api-coverage-report.json](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
